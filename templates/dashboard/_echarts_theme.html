<script>
window.OIFCharts = (function () {
  var bodyFont = '{{ site_branding.body_font|escapejs }}', titleFont = '{{ site_branding.title_font|escapejs }}';
  var palette = ['#6f4a2f', '#4a5d3a', '#cda983', '#1a1512', '#9a6b48', '#7a8f62', '#d8b892'];
  var axis = '#8a7b6b', line = 'rgba(26,21,18,0.12)', ink = '#1a1512';

  function gradient(from, to) {
    return new echarts.graphic.LinearGradient(0, 0, 0, 1, [
      { offset: 0, color: from },
      { offset: 1, color: to }
    ]);
  }

  function tooltip(trigger) {
    return {
      trigger: trigger || 'axis',
      backgroundColor: 'rgba(26,21,18,0.94)',
      borderColor: 'rgba(255,255,255,0.12)',
      borderWidth: 1,
      padding: [10, 12],
      textStyle: { color: '#faf6f0', fontFamily: bodyFont, fontSize: 12 },
      extraCssText: 'box-shadow:0 16px 40px rgba(26,21,18,0.18);border-radius:6px;'
    };
  }

  function base(extra) {
    return Object.assign({
      color: palette,
      backgroundColor: 'transparent',
      textStyle: { fontFamily: bodyFont, color: ink },
      animationDuration: 900,
      animationEasing: 'cubicOut',
      grid: { left: 48, right: 22, top: 34, bottom: 48, containLabel: true }
    }, extra || {});
  }

  function xAxis(labels, rotate) {
    return {
      type: 'category',
      data: labels || [],
      boundaryGap: true,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        color: axis,
        fontFamily: bodyFont,
        fontSize: 11,
        margin: 14,
        interval: 0,
        rotate: rotate || 0
      }
    };
  }

  function yAxis() {
    return {
      type: 'value',
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { color: axis, fontFamily: bodyFont, fontSize: 11 },
      splitLine: { lineStyle: { color: line, type: 'dashed' } }
    };
  }

  function lineOpt(rows) {
    rows = rows || { labels: [], values: [] };
    return base({
      tooltip: tooltip('axis'),
      xAxis: xAxis(rows.labels),
      yAxis: yAxis(),
      series: [{
        type: 'line',
        smooth: true,
        data: rows.values || [],
        symbol: 'circle',
        symbolSize: 8,
        lineStyle: { width: 4, color: '#6f4a2f', shadowBlur: 8, shadowColor: 'rgba(111,74,47,0.18)' },
        itemStyle: { color: '#6f4a2f', borderColor: '#faf6f0', borderWidth: 2 },
        areaStyle: { color: gradient('rgba(111,74,47,0.24)', 'rgba(111,74,47,0.02)') },
        emphasis: { focus: 'series' }
      }]
    });
  }

  function barOpt(rows) {
    rows = rows || { labels: [], values: [] };
    var rotate = rows.labels && rows.labels.length > 3 ? 15 : 0;
    return base({
      tooltip: tooltip('axis'),
      xAxis: xAxis(rows.labels, rotate),
      yAxis: yAxis(),
      series: [{
        type: 'bar',
        data: rows.values || [],
        barMaxWidth: 42,
        itemStyle: {
          borderRadius: [6, 6, 0, 0],
          color: gradient('#9a6b48', '#6f4a2f')
        },
        emphasis: { itemStyle: { color: '#4a5d3a' } }
      }]
    });
  }

  function pieOpt(rows) {
    return base({
      tooltip: tooltip('item'),
      legend: {
        bottom: 0,
        left: 'center',
        icon: 'roundRect',
        itemWidth: 10,
        itemHeight: 10,
        textStyle: { color: axis, fontFamily: bodyFont, fontSize: 11 }
      },
      series: [{
        type: 'pie',
        radius: ['52%', '72%'],
        center: ['50%', '43%'],
        data: rows || [],
        avoidLabelOverlap: true,
        itemStyle: { borderColor: '#faf6f0', borderWidth: 3 },
        label: { color: ink, fontFamily: bodyFont, fontSize: 11, formatter: '{b}\n{d}%' },
        labelLine: { length: 12, length2: 8, lineStyle: { color: line } },
        emphasis: { scale: true, scaleSize: 6 }
      }]
    });
  }

  function stackedOpt(payload) {
    payload = payload || { categories: [], series: [] };
    return base({
      tooltip: tooltip('axis'),
      legend: {
        bottom: 0,
        textStyle: { color: axis, fontFamily: bodyFont, fontSize: 11 }
      },
      xAxis: xAxis(payload.categories),
      yAxis: yAxis(),
      series: (payload.series || []).map(function (s, index) {
        return {
          name: s.name,
          type: 'bar',
          stack: 'total',
          data: s.data || [],
          barMaxWidth: 38,
          itemStyle: {
            borderRadius: index === (payload.series.length - 1) ? [6, 6, 0, 0] : 0
          },
          emphasis: { focus: 'series' }
        };
      })
    });
  }

  function init(el, option) {
    var chart = echarts.init(el, null, { renderer: 'canvas' });
    chart.setOption(option);
    return chart;
  }

  return {
    palette: palette,
    titleFont: titleFont,
    bodyFont: bodyFont,
    line: lineOpt,
    bar: barOpt,
    pie: pieOpt,
    stacked: stackedOpt,
    init: init
  };
})();
</script>
