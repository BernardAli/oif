{% extends "base.html" %}
{% block title %}Password reset complete · {{ ORG_NAME }}{% endblock %}
{% block content %}
<section class="page active premium-page form-page-premium auth-page">
  <div class="container">
    <div class="status-panel-premium">
      <div class="status-mark">✓</div>
      <div class="eyebrow">Password updated</div>
      <h1 class="display">You can sign in now.</h1>
      <p>Your password has been changed successfully.</p>
      <div class="form-actions"><a class="btn-primary" href="{% url 'accounts:login' %}">Sign in</a></div>
    </div>
  </div>
</section>
{% endblock %}
