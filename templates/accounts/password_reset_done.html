{% extends "base.html" %}
{% block title %}Reset email sent · {{ ORG_NAME }}{% endblock %}
{% block content %}
<section class="page active premium-page form-page-premium auth-page">
  <div class="container">
    <div class="status-panel-premium">
      <div class="status-mark">✓</div>
      <div class="eyebrow">Check your inbox</div>
      <h1 class="display">Password reset email sent.</h1>
      <p>If an account exists for that email address, you will receive password reset instructions shortly.</p>
      <div class="form-actions"><a class="btn-primary" href="{% url 'accounts:login' %}">Back to sign in</a></div>
    </div>
  </div>
</section>
{% endblock %}
